<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>N2 日本語能力試験 — 备考助手</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header>
  <div class="header-brand">N<span>2</span> 备考助手</div>
  <div class="countdown">
    <span>距离考试</span>
    <span class="days">48</span>
    <span class="unit">天</span>
  </div>
</header>

<!-- Main Content -->
<main>
  <!-- 仪表盘 -->
  <section class="page active" id="page-dashboard"></section>

  <!-- 词汇闪卡 -->
  <section class="page" id="page-flashcards"></section>

  <!-- 练习题 -->
  <section class="page" id="page-quiz"></section>

  <!-- 错题本 -->
  <section class="page" id="page-errors"></section>

  <!-- 学习统计 -->
  <section class="page" id="page-stats"></section>
</main>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <button class="nav-item active" data-page="dashboard">
    <span class="nav-icon">🏠</span>首页
  </button>
  <button class="nav-item" data-page="flashcards">
    <span class="nav-icon">📝</span>词汇
  </button>
  <button class="nav-item" data-page="quiz" data-sub="vocab">
    <span class="nav-icon">📖</span>练习
  </button>
  <button class="nav-item" data-page="errors">
    <span class="nav-icon">📌</span>错题
  </button>
  <button class="nav-item" data-page="stats">
    <span class="nav-icon">📊</span>统计
  </button>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
